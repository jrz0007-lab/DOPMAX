services:
  # Servicio Web para el backend
  - type: web
    name: dopmax-backend
    env: node
    region: frankfurt
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        fromDatabase:
          name: dopmax-db
          property: connectionString

  # Servicio para archivos estáticos (frontend)
  - type: static
    name: dopmax-frontend
    env: static
    region: frankfurt
    plan: free
    buildCommand: echo "No build needed"
    publishDir: .
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: dopmax-db
    databaseName: dopmax
    user: dopmax_user
    plan: free
    region: frankfurt
